<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  body { width: 560px; margin: 0; padding: 16px; color: #1d1d1f; background: #fff; }
  h1 { font-size: 14px; margin: 0 0 2px; }
  p.sub { font-size: 11px; color: #86868b; margin: 0 0 14px; }
  label { display: block; font-size: 11px; font-weight: 600; color: #6e6e73; margin: 10px 0 4px; }
  input { width: 100%; font-size: 12px; padding: 7px 9px; border: 1px solid #d2d2d7; border-radius: 8px; }
  input.mono { font-family: ui-monospace, Menlo, monospace; }
  button { font-size: 12px; font-weight: 600; padding: 8px 12px; border-radius: 8px; border: 0; cursor: pointer; }
  button.primary { background: #0071e3; color: #fff; }
  button.primary:disabled { opacity: .6; cursor: default; }
  button.ghost { background: #fff; border: 1px solid #d2d2d7; color: #1d1d1f; }
  .row { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
  .grow { flex: 1; }
  #status { font-size: 11px; margin-top: 12px; min-height: 14px; }
  #status.err { color: #ff3b30; }
  #status.ok { color: #1f8a3a; }
  #list { margin-top: 12px; max-height: 360px; overflow-y: auto; overflow-x: hidden; border-top: 1px solid #f0f0f0; }
  .item { display: grid; grid-template-columns: 20px 40px minmax(0, 1fr); column-gap: 10px;
          align-items: center; padding: 8px 2px; border-bottom: 1px solid #f0f0f0; }
  .item input[type=checkbox] { width: 15px; height: 15px; margin: 0; }
  .item .thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: contain;
                 background: #f5f5f7; border: 1px solid #ececec; }
  .item .thumb.ph { display: flex; align-items: center; justify-content: center; color: #c7c7cc; font-size: 9px; }
  .item .body { min-width: 0; }
  .item .name { font-size: 12px; font-weight: 600; line-height: 1.3; white-space: nowrap;
                overflow: hidden; text-overflow: ellipsis; }
  .item .name .brand { color: #86868b; }
  .item .meta { margin-top: 2px; color: #6e6e73; font-size: 11px; white-space: nowrap;
                overflow: hidden; text-overflow: ellipsis; }
  .item .meta .asin { font-family: ui-monospace, Menlo, monospace; color: #1d1d1f; }
  .item .meta .epc { color: #1f8a3a; font-weight: 700; }
  .item .meta .ends { color: #86868b; }
  .item .meta .bud { font-weight: 700; text-transform: capitalize; }
  .item .meta .bud.high { color: #1f8a3a; }
  .item .meta .bud.medium { color: #b26a00; }
  .item .meta .bud.low { color: #c0001a; }
  .item.dim { opacity: 0.5; }
  .filters { display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
             margin-top: 12px; padding: 10px 12px; background: #f7f7f8;
             border: 1px solid #ececec; border-radius: 10px; font-size: 11px; color: #6e6e73; }
  .filters label { margin: 0; display: flex; align-items: center; gap: 6px; font-weight: 600; }
  .filters input[type=number] { width: 70px; padding: 5px 7px; }
  .filters input[type=text] { width: 150px; padding: 5px 7px; }
  .filters input[type=checkbox] { width: 14px; height: 14px; }
  .filters .qual { margin-left: auto; font-weight: 700; color: #1d1d1f; }
</style>
</head>
<body>
  <h1>MVP Affiliate — CC Scout</h1>
  <p class="sub">Scan an Amazon Creator Connections page, then push the campaigns you pick into your CC Campaigns queue.</p>

  <label for="token">Ingest token</label>
  <input id="token" class="mono" placeholder="cc_…  (copy it from the CC Campaigns page)" />

  <div class="row">
    <button id="scan" class="primary grow">Scan this page</button>
    <button id="saveToken" class="ghost">Save token</button>
  </div>
  <div class="row">
    <button id="oneClick" class="primary grow" style="background:#1f8a3a">⚡ Scan &amp; push qualifying</button>
  </div>

  <div class="filters">
    <label>Keyword <input id="keyword" type="text" placeholder="e.g. cooler, kitchen" /></label>
    <label>Min EPC&nbsp;$ <input id="minEpc" type="number" step="0.05" min="0" value="0.20" /></label>
    <label><input id="reqBudget" type="checkbox" checked /> Budget ≥ Medium</label>
    <span class="qual" id="qualCount"></span>
  </div>

  <div id="status"></div>
  <div id="list"></div>

  <div class="row" id="pushRow" style="display:none">
    <button id="selectAll" class="ghost">Select all</button>
    <button id="push" class="primary grow">Push selected</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
